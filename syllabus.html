<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Syllabus - LBS Institute</title>

<link rel="stylesheet" href="assets/styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
  background:#0f172a;
  color:white;
}

/* SECTION */
.syllabus-section{
  padding:80px 20px;
  text-align:center;
}

/* TITLE */
.title{
  font-size:40px;
  margin-bottom:30px;
}

/* FILTER BUTTON */
.filter-btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:25px;
  background:#00d4ff;
  cursor:pointer;
  transition:0.3s;
}

.filter-btn.active{
  background:white;
  color:black;
}

/* GRID */
.syllabus-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.syllabus-card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.4s;
}

.syllabus-card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* HIDE */
.hide{
  display:none;
}

/* BUTTON */
.download-btn{
  margin-top:40px;
  padding:15px 30px;
  background:#00d4ff;
  border:none;
  cursor:pointer;
}

</style>

</head>

<body>

<!-- DARK MODE -->
<button id="darkModeToggle">🌙</button>

<!-- HERO -->
<section class="hero">

<div class="overlay"></div>

<div class="hero-content">
<h1>Shree GuruKripa Gyandeep Public Inter College</h1>
<p>Course Syllabus</p>
</div>

</section>

<!-- SYLLABUS -->
<section class="syllabus-section">

<h1 class="title">📘 Course Syllabus</h1>

<!-- FILTER -->
<div>
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="adca">ADCA</button>
<button class="filter-btn" data-filter="ccc">CCC</button>
<button class="filter-btn" data-filter="tally">Tally</button>
</div>

<!-- CARDS -->
<div class="syllabus-container" id="syllabus">

<div class="syllabus-card adca">
<h2>ADCA</h2>
<ul>
<li>MS Word</li>
<li>Excel</li>
<li>PowerPoint</li>
<li>Photoshop</li>
</ul>
</div>

<div class="syllabus-card ccc">
<h2>CCC</h2>
<ul>
<li>Basic Computer</li>
<li>Internet</li>
<li>Email</li>
</ul>
</div>

<div class="syllabus-card tally">
<h2>Tally</h2>
<ul>
<li>Accounting</li>
<li>GST</li>
<li>Inventory</li>
</ul>
</div>

</div>

<!-- DOWNLOAD -->
<button class="download-btn" onclick="generatePDF()">Download PDF</button>

</section>

<script>

// DARK MODE
document.getElementById("darkModeToggle").onclick = ()=>{
  document.body.classList.toggle("dark-mode");
}

// FILTER
const btns = document.querySelectorAll(".filter-btn");
const cards = document.querySelectorAll(".syllabus-card");

btns.forEach(btn=>{
  btn.addEventListener("click",()=>{
    
    btns.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    let filter = btn.getAttribute("data-filter");

    cards.forEach(card=>{
      if(filter==="all" || card.classList.contains(filter)){
        card.classList.remove("hide");
      }else{
        card.classList.add("hide");
      }
    });

  });
});

// PDF
function generatePDF(){

let content = document.getElementById("syllabus");

html2pdf().from(content).save("Syllabus.pdf");

}

</script>

</body>
</html>
